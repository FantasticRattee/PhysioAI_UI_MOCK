<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PhysioAI · Patient Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/style.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="../shared/components.js"></script>
<script type="text/babel" data-presets="react" src="../shared/nav.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
function App() {
  const [lang, setLang] = useLangState();
  const [mode, setMode] = React.useState('practice');
  const handleSelectMode = (m) => {
    setMode(m);
    window.location.href = modeHrefFromCurrentPath('patient/home', m);
  };
  return (
    <LangCtx.Provider value={lang}>
      <PxKeyframes />
      <NavBar currentPath="patient/home" lang={lang} setLang={setLang} />
      <MobileShell>
        <Phone><ScreenModes current={mode} setCurrent={handleSelectMode} /></Phone>
      </MobileShell>
    </LangCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
